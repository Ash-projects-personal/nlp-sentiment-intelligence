name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff
      - name: Pre-fetch NLTK data
        run: |
          python -c "import nltk; [nltk.download(r, quiet=True) for r in ('vader_lexicon','punkt','punkt_tab')]"
      - name: Lint (non-blocking)
        run: ruff check . || true
      - name: Run tests
        run: pytest -q
